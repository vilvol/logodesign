<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo & Merchandise</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ---- SHOWCASE ---- */

    .showcase-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 72px; /* nav height */
    }

    .showcase-stage {
      flex: 1;
      display: grid;
      grid-template-columns: 320px 1fr;
      max-width: var(--max-width);
      width: 100%;
      margin: 0 auto;
      padding: 64px 32px;
      gap: 64px;
      align-items: center;
    }

    /* Left panel */
    .showcase-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .showcase-dot {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.1);
      transition: background 0.35s ease;
    }

    .showcase-name {
      font-family: var(--font-display);
      font-size: clamp(28px, 3vw, 40px);
      font-weight: 300;
      color: var(--color-navy);
      letter-spacing: 0.02em;
      transition: opacity 0.2s;
    }

    .showcase-desc {
      font-size: 14px;
      color: var(--color-muted);
      line-height: 1.7;
      font-weight: 300;
      transition: opacity 0.2s;
    }

    .showcase-nav {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .showcase-nav-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      padding: 0;
      background-clip: padding-box;
      position: relative;
    }

    .showcase-nav-dot::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      transition: border-color 0.2s;
    }

    .showcase-nav-dot.active::after {
      border-color: var(--color-navy);
    }

    .showcase-nav-dot:hover {
      transform: scale(1.15);
    }

    /* Right panel */
    .showcase-images-col {
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .showcase-images {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .showcase-image-wrap {
      position: relative;
      background: none;
      border: none;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .showcase-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 16px;
      transition: opacity 0.3s ease, transform 0.4s ease;
    }

    .showcase-image-wrap img.fading {
      opacity: 0;
      transform: scale(0.97);
    }

    .showcase-view-label {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-muted);
    }

    /* Show all button */
    .show-all-wrap {
      text-align: left;
      padding-top: 24px;
    }

    .show-all-btn {
      background: none;
      border: 1px solid var(--color-navy);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-muted);
      padding: 12px 32px;
      border-radius: 2px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .show-all-btn:hover {
      color: var(--color-navy);
    }

    /* All products panel (reuses product styles from style.css) */
    .all-products {
      border-top: 1px solid var(--color-border);
    }

    .all-products[hidden] {
      display: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .showcase-stage {
        grid-template-columns: 1fr;
        gap: 32px;
        padding: 40px 20px;
      }

      .showcase-info {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: flex-start;
      }

      .showcase-dot {
        width: 36px;
        height: 36px;
      }

      .showcase-name,
      .showcase-desc,
      .showcase-nav {
        width: 100%;
      }

      .showcase-images {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- LOGIN OVERLAY -->
  <div id="login-overlay" style="display:none;">
    <div class="login-card">
      <p class="login-label">Salasana</p>
      <input id="login-pw" class="login-input" type="password" autocomplete="current-password" autofocus />
      <button id="login-btn" class="login-btn">OK</button>
    </div>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-brand">HTA</a>
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav.logos">Logot</a></li>
      <li><a href="showcase.html" data-i18n="nav.showcase">Paidat</a></li>
    </ul>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="fi">FI</button>
      <button class="lang-btn" data-lang="sv">SV</button>
    </div>
  </nav>

 
  <!-- SHOWCASE -->
  <div class="showcase-page">

    <div class="section-header" style="padding-top: 20px;">
      <h2 class="section-title" data-i18n="merch.title">Tuotteet</h2>
      <p class="section-desc" data-i18n="merch.desc">Logoperhe sovellettuna huppukokoelmaan eri väreissä.</p>
    </div>

    <div class="showcase-stage">
      <!-- Left: info -->
      <div class="showcase-info">
        <span class="showcase-dot" id="sc-dot"></span>
        <h2 class="showcase-name" id="sc-name"></h2>
        <p class="showcase-desc" id="sc-desc"></p>
        <div class="showcase-nav" id="sc-nav"></div>
        <div class="show-all-wrap">
          <button class="show-all-btn" id="show-all-btn" data-i18n="showcase.showAll">Näytä kaikki vaihtoehdot</button>
        </div>
      </div>

      <!-- Right: images -->
      <div class="showcase-images-col">
        <div class="showcase-images">
          <div class="showcase-image-wrap">
            <img id="sc-front" src="" alt="" />
            <span class="showcase-view-label" data-i18n="label.front">Edestä</span>
          </div>
          <div class="showcase-image-wrap">
            <img id="sc-back" src="" alt="" />
            <span class="showcase-view-label" data-i18n="label.back">Takaa</span>
          </div>
        </div>
      </div>
    </div>

    <!-- All products (hidden initially) -->
    <div class="all-products section section--alt" id="all-products" hidden>
      <div id="variants-grid"></div>
    </div><!-- /all-products -->

     <!-- EDITORIAL -->
  <section class="editorial">
    <img src="images/merchandise/model-03.png" alt="HTA hoodie model" />
  </section>


  </div><!-- /showcase-page -->

  <!-- FOOTER -->
  <footer class="footer">
    <span>Helsingin Taitoluisteluakatemia</span>
    <span class="footer-sep">—</span>
    <span data-i18n="footer.tagline">Visuaalinen identiteetti &amp; tuotteet</span>
  </footer>

  <!-- LIGHTBOX -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Sulje">&#x2715;</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script src="js/i18n.js"></script>
  <script>
    // Add showcase strings to i18n
    Object.assign(translations.fi, {
      'showcase.showAll': 'Näytä logovariaatiot',
      'showcase.showLess': 'Piilota variaatiot',
      'showcase.stage.desc': 'Vaihda hupparin väri alla olevista pisteistä.',
    });
    Object.assign(translations.en, {
      'showcase.showAll': 'Show logo variations',
      'showcase.showLess': 'Hide variations',
      'showcase.stage.desc': 'Change hoodie color from the dots below.',
    });
    Object.assign(translations.sv, {
      'showcase.showAll': 'Visa logotypvarianter',
      'showcase.showLess': 'Dölj varianter',
      'showcase.stage.desc': 'Byt hoodiefärg med punkterna nedan.',
    });

    // Re-apply language now that showcase strings are registered
    setLanguage(localStorage.getItem('hta-lang') || 'en');

    // Hoodie data
    const hoodies = [
      {
        key: 'lavender',
        color: '#DAC6D7',
        front: 'images/merchandise/showcase-hoodie-lavender-front.png',
        back:  'images/merchandise/showcase-hoodie-lavender-back.png',
        variants: [
          { labelKey: 'logos.label2', front: 'images/merchandise/logo-lavender-v1-front.png', back: 'images/merchandise/logo-lavender-v1-back.png' },
          { labelKey: 'logos.label3', front: 'images/merchandise/logo-lavender-v2-front.png', back: 'images/merchandise/logo-lavender-v2-back.png' },
          { labelKey: 'logos.label4', front: 'images/merchandise/logo-lavender-v3-front.png', back: 'images/merchandise/logo-lavender-v3-back.png' },
          { labelKey: 'logos.label5', front: 'images/merchandise/logo-lavender-v4-front.png', back: 'images/merchandise/logo-lavender-v4-back.png' },
          { labelKey: 'logos.label6', front: 'images/merchandise/logo-lavender-v5-front.png', back: 'images/merchandise/logo-lavender-v5-back.png' },
        ],
      },
      {
        key: 'blue',
        color: '#C4DAEE',
        front: 'images/merchandise/showcase-hoodie-blue-front.png',
        back:  'images/merchandise/showcase-hoodie-blue-back.png',
        variants: [
          { labelKey: 'logos.label2', front: 'images/merchandise/logo-blue-v1-front.png', back: 'images/merchandise/logo-blue-v1-back.png' },
          { labelKey: 'logos.label3', front: 'images/merchandise/logo-blue-v2-front.png', back: 'images/merchandise/logo-blue-v2-back.png' },
          { labelKey: 'logos.label4', front: 'images/merchandise/logo-blue-v3-front.png', back: 'images/merchandise/logo-blue-v3-back.png' },
          { labelKey: 'logos.label5', front: 'images/merchandise/logo-blue-v4-front.png', back: 'images/merchandise/logo-blue-v4-back.png' },
          { labelKey: 'logos.label6', front: 'images/merchandise/logo-blue-v5-front.png', back: 'images/merchandise/logo-blue-v5-back.png' },
        ],
      },
      {
        key: 'lilac',
        color: '#AFB6D9',
        front: 'images/merchandise/showcase-hoodie-lilac-front.png',
        back:  'images/merchandise/showcase-hoodie-lilac-back.png',
        variants: [
          { labelKey: 'logos.label2', front: 'images/merchandise/logo-lilac-v1-front.png', back: 'images/merchandise/logo-lilac-v1-back.png' },
          { labelKey: 'logos.label3', front: 'images/merchandise/logo-lilac-v2-front.png', back: 'images/merchandise/logo-lilac-v2-back.png' },
          { labelKey: 'logos.label4', front: 'images/merchandise/logo-lilac-v3-front.png', back: 'images/merchandise/logo-lilac-v3-back.png' },
          { labelKey: 'logos.label5', front: 'images/merchandise/logo-lilac-v4-front.png', back: 'images/merchandise/logo-lilac-v4-back.png' },
          { labelKey: 'logos.label6', front: 'images/merchandise/logo-lilac-v5-front.png', back: 'images/merchandise/logo-lilac-v5-back.png' },
        ],
      },
      {
        key: 'teal',
        color: '#80AEBC',
        front: 'images/merchandise/showcase-hoodie-teal-front.png',
        back:  'images/merchandise/showcase-hoodie-teal-back.png',
        variants: [
          { labelKey: 'logos.label2', front: 'images/merchandise/logo-teal-v1-front.png', back: 'images/merchandise/logo-teal-v1-back.png' },
          { labelKey: 'logos.label3', front: 'images/merchandise/logo-teal-v2-front.png', back: 'images/merchandise/logo-teal-v2-back.png' },
          { labelKey: 'logos.label4', front: 'images/merchandise/logo-teal-v3-front.png', back: 'images/merchandise/logo-teal-v3-back.png' },
          { labelKey: 'logos.label5', front: 'images/merchandise/logo-teal-v4-front.png', back: 'images/merchandise/logo-teal-v4-back.png' },
          { labelKey: 'logos.label6', front: 'images/merchandise/logo-teal-v5-front.png', back: 'images/merchandise/logo-teal-v5-back.png' },
        ],
      },
      {
        key: 'navy',
        color: '#4D5F86',
        front: 'images/merchandise/showcase-hoodie-navy-front.png',
        back:  'images/merchandise/showcase-hoodie-navy-back.png',
        variants: [
          { labelKey: 'logos.label2', front: 'images/merchandise/logo-navy-v1-front.png', back: 'images/merchandise/logo-navy-v1-back.png' },
          { labelKey: 'logos.label3', front: 'images/merchandise/logo-navy-v2-front.png', back: 'images/merchandise/logo-navy-v2-back.png' },
          { labelKey: 'logos.label4', front: 'images/merchandise/logo-navy-v3-front.png', back: 'images/merchandise/logo-navy-v3-back.png' },
          { labelKey: 'logos.label5', front: 'images/merchandise/logo-navy-v4-front.png', back: 'images/merchandise/logo-navy-v4-back.png' },
          { labelKey: 'logos.label6', front: 'images/merchandise/logo-navy-v5-front.png', back: 'images/merchandise/logo-navy-v5-back.png' },
        ],
      },
      {
        key: 'darknavy',
        color: '#2C3546',
        front: 'images/merchandise/showcase-hoodie-darknavy-front.png',
        back:  'images/merchandise/showcase-hoodie-darknavy-back.png',
        variants: [
          { labelKey: 'logos.label2', front: 'images/merchandise/logo-darknavy-v1-front.png', back: 'images/merchandise/logo-darknavy-v1-back.png' },
          { labelKey: 'logos.label3', front: 'images/merchandise/logo-darknavy-v2-front.png', back: 'images/merchandise/logo-darknavy-v2-back.png' },
          { labelKey: 'logos.label4', front: 'images/merchandise/logo-darknavy-v3-front.png', back: 'images/merchandise/logo-darknavy-v3-back.png' },
          { labelKey: 'logos.label5', front: 'images/merchandise/logo-darknavy-v4-front.png', back: 'images/merchandise/logo-darknavy-v4-back.png' },
          { labelKey: 'logos.label6', front: 'images/merchandise/logo-darknavy-v5-front.png', back: 'images/merchandise/logo-darknavy-v5-back.png' },
        ],
      },
    ];

    let current = 0;
    const scDot   = document.getElementById('sc-dot');
    const scName  = document.getElementById('sc-name');
    const scDesc  = document.getElementById('sc-desc');
    const scFront = document.getElementById('sc-front');
    const scBack  = document.getElementById('sc-back');
    const scNav   = document.getElementById('sc-nav');

    function getLang() {
      return localStorage.getItem('hta-lang') || 'fi';
    }

    function renderText(idx) {
      const lang = getLang();
      const h = hoodies[idx];
      scName.textContent = translations[lang]['product.' + h.key + '.name'] || '';
      scDesc.textContent = translations[lang]['showcase.stage.desc'] || '';
      scDot.style.background = h.color;
    }

    function switchTo(idx, skipFade) {
      const h = hoodies[idx];
      current = idx;

      // Update nav dots
      scNav.querySelectorAll('.showcase-nav-dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
      });

      // Text update
      renderText(idx);

      if (skipFade) {
        scFront.src = h.front;
        scBack.src  = h.back;
        return;
      }

      // Re-render variants if panel is open
      const ap = document.getElementById('all-products');
      if (ap && !ap.hidden) renderVariants(idx);

      // Fade images
      scFront.classList.add('fading');
      scBack.classList.add('fading');
      setTimeout(() => {
        scFront.src = h.front;
        scBack.src  = h.back;
        scFront.classList.remove('fading');
        scBack.classList.remove('fading');
      }, 280);
    }

    // Build nav dots
    hoodies.forEach((h, i) => {
      const btn = document.createElement('button');
      btn.className = 'showcase-nav-dot';
      btn.style.background = h.color;
      btn.setAttribute('aria-label', h.key);
      btn.addEventListener('click', () => switchTo(i));
      scNav.appendChild(btn);
    });

    // Initial render
    switchTo(0, true);

    // Render logo variants for the selected colour into #variants-grid
    function renderVariants(idx) {
      const h = hoodies[idx];
      const lang = getLang();
      const frontLabel = translations[lang]['label.front'] || 'Front';
      const backLabel  = translations[lang]['label.back']  || 'Back';
      const grid = document.getElementById('variants-grid');
      grid.innerHTML = '';

      const variants = (h.variants && h.variants.length)
        ? h.variants
        : [{ labelKey: 'product.' + h.key + '.name', front: h.front, back: h.back }];

      variants.forEach((v, i) => {
        const label = translations[lang][v.labelKey] || v.labelKey;
        const el = document.createElement('div');
        el.className = 'product' + (i % 2 === 1 ? ' product--reverse' : '');
        el.innerHTML = `
          <div class="product__info">
            <span class="product__color-dot" style="background:${h.color};"></span>
            <div><h3 class="product__name">${label}</h3></div>
          </div>
          <div class="product__images">
            <div class="product__image-wrap">
              <img src="${v.front}" alt="${label} front" />
              <span class="product__view-label">${frontLabel}</span>
            </div>
            <div class="product__image-wrap">
              <img src="${v.back}" alt="${label} back" />
              <span class="product__view-label">${backLabel}</span>
            </div>
          </div>`;
        grid.appendChild(el);
      });
    }

    // Re-render text on language change (hook into setLanguage)
    const _origSetLanguage = setLanguage;
    window.setLanguage = function(lang) {
      _origSetLanguage(lang);
      renderText(current);
      if (!allProducts.hidden) renderVariants(current);
    };

    // Show all toggle
    const showAllBtn = document.getElementById('show-all-btn');
    const allProducts = document.getElementById('all-products');
    showAllBtn.addEventListener('click', () => {
      const isHidden = allProducts.hidden;
      allProducts.hidden = !isHidden;
      const lang = getLang();
      showAllBtn.textContent = isHidden
        ? translations[lang]['showcase.showLess']
        : translations[lang]['showcase.showAll'];
      if (isHidden) {
        renderVariants(current);
        allProducts.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  </script>

  <!-- Lightbox -->
  <script>
    (function () {
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');

      function openLightbox(src, alt) {
        lightboxImg.src = src;
        lightboxImg.alt = alt;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
      }

      // Delegate clicks on gallery images
      document.getElementById('all-products').addEventListener('click', function (e) {
        const wrap = e.target.closest('.product__image-wrap');
        if (!wrap) return;
        const img = wrap.querySelector('img');
        if (img) openLightbox(img.src, img.alt);
      });

      document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', function (e) {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeLightbox();
      });
    })();
  </script>

  <!-- Login -->
  <script>
    (function () {
      if (sessionStorage.getItem('hta-auth') === '1') return;
      const overlay = document.getElementById('login-overlay');
      overlay.style.display = 'flex';
      document.body.classList.add('login-active');

      function attempt() {
        const val = document.getElementById('login-pw').value;
        if (val === 'htakatemia') {
          sessionStorage.setItem('hta-auth', '1');
          overlay.classList.add('login-overlay--out');
          document.body.classList.remove('login-active');
          setTimeout(() => overlay.remove(), 400);
        } else {
          const field = document.getElementById('login-pw');
          field.classList.add('login-input--error');
          field.value = '';
          field.focus();
          setTimeout(() => field.classList.remove('login-input--error'), 600);
        }
      }

      document.getElementById('login-btn').addEventListener('click', attempt);
      document.getElementById('login-pw').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') attempt();
      });
    })();
  </script>
</body>
</html>
